<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Lexicon - Radix Trie Dictionary</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./css/style.css">
    </head>

    <body>
        <div class="container">
            <div class="search-section">
                <div class="header">
                    <h1>Lexicon</h1>
                    <p class="subtitle">Radix-Trie Indexed Dictionary</p>
                </div>
    
                <form class="action-form" id="searchform">
                    <input type="text" id="searchinput" class="custom-input" placeholder="Search word..." autocomplete="off">
                    <button type="submit" class="action-button search-btn">Search</button>
                </form>

                <form class="action-form multi-input" id="addform">
                    <input type="text" id="addwordinput" class="custom-input" placeholder="New word..." required>
                    <input type="text" id="addmeaninginput" class="custom-input" placeholder="Meaning..." required>
                    <button type="submit" class="action-button add-btn">Add</button>
                </form>

                <form class="action-form" id="delform">
                    <input type="text" id="delwordinput" class="custom-input" placeholder="Word to delete..." required>
                    <button type="submit" class="action-button del-btn">Delete</button>
                </form>

                <div class="data-controls" style="display: flex; gap: 0.5rem; margin-top: 2rem; padding-top: 1.5rem; border-top: 2px dashed #ddd6fe;">
                    <button id="export-btn" class="action-button" style="flex: 1; background: linear-gradient(to right, #3b82f6, #2563eb);">Export .json</button>
                    <button id="import-btn" class="action-button" style="flex: 1; background: linear-gradient(to right, #f59e0b, #d97706);">Import .json</button>
                    <input type="file" id="file-input" accept=".json" class="hidden">
                </div>

                <div id="results" class="hidden"></div>
            </div>
            
            <div class="trie-section">
                <div class="trie-card">
                    <div class="trie-header">
                        <h3>Radix Trie Structure</h3>
                        <span class="status-badge">Live Visualization</span>
                    </div>
                    <div id="trie-visualizer" class="trie-container">
                        </div>
                </div>
            </div>
        </div>

        <script src="./js/script.js"></script>
    </body>
</html>
