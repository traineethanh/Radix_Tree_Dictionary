<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexicon — Radix Trie Dictionary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --accent: #c0392b;
    --accent2: #2c3e6b;
    --gold: #b8860b;
    --muted: #7a7060;
    --border: #c8bfaa;
    --trie-node: #2c3e6b;
    --trie-edge: #c0392b;
    --trie-leaf: #27734a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    background-image: 
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(0,0,0,0.03) 28px),
      url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='60' height='60' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  }

  /* ── Header ── */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 20px 48px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 3px solid var(--accent);
    position: sticky; top:0; z-index:100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.2);
  }
  .logo { display:flex; align-items:baseline; gap:12px; }
  .logo-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28px; letter-spacing: -0.5px;
  }
  .logo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--accent);
    letter-spacing: 2px; text-transform: uppercase;
  }
  .header-stats {
    display: flex; gap: 32px; font-family: 'DM Mono', monospace; font-size: 12px;
  }
  .stat { text-align:center; }
  .stat-val { font-size: 22px; color: var(--accent); display:block; }
  .stat-lbl { color: #999; letter-spacing: 1px; }

  /* ── Layout ── */
  .app { display: grid; grid-template-columns: 380px 1fr; min-height: calc(100vh - 73px); }

  /* ── Left Panel ── */
  .left-panel {
    background: var(--cream);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .panel-section {
    padding: 24px;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before {
    content: ''; display:block; width:16px; height:1px; background:var(--accent);
  }

  /* Input group */
  .input-row { display:flex; flex-direction:column; gap:10px; }
  input[type="text"], textarea {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    background: var(--paper);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    color: var(--ink);
    transition: border-color 0.2s;
    outline: none;
  }
  input[type="text"]:focus, textarea:focus { border-color: var(--accent2); }
  textarea { resize: vertical; min-height: 80px; }

  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  button {
    font-family: 'DM Mono', monospace;
    font-size: 12px; letter-spacing: 1px;
    padding: 9px 18px;
    border: none; border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .btn-add { background: var(--accent2); color: #fff; flex:1; }
  .btn-add:hover { background: #1e2d52; transform: translateY(-1px); }
  .btn-del { background: var(--accent); color: #fff; flex:1; }
  .btn-del:hover { background: #a02920; transform: translateY(-1px); }
  .btn-search { background: var(--ink); color: var(--paper); flex:1; }
  .btn-search:hover { background: #2c2c3e; transform: translateY(-1px); }
  .btn-clear { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 9px 14px; }
  .btn-clear:hover { background: var(--border); }

  /* Word list */
  .wordlist-wrap { flex:1; overflow-y: auto; padding: 16px 24px; }
  .wordlist-header {
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 2px; color: var(--muted);
    text-transform: uppercase; padding-bottom: 10px;
    border-bottom: 1px solid var(--border); margin-bottom: 10px;
  }
  .word-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 10px; border-radius: 4px;
    cursor: pointer; transition: background 0.15s;
    border-left: 2px solid transparent;
  }
  .word-item:hover { background: rgba(0,0,0,0.05); }
  .word-item.active {
    background: rgba(44,62,107,0.08);
    border-left-color: var(--accent2);
  }
  .word-text { font-family: 'DM Serif Display', serif; font-size: 16px; }
  .word-type { font-size: 11px; color: var(--muted); font-style: italic; }
  .word-del-btn {
    opacity: 0; font-size: 14px; background: none;
    color: var(--accent); padding: 2px 6px;
    border: none; cursor: pointer; text-transform: none;
    letter-spacing: 0; transition: opacity 0.15s;
  }
  .word-item:hover .word-del-btn { opacity: 1; }

  /* ── Right Panel ── */
  .right-panel { display: flex; flex-direction: column; overflow: hidden; }

  .tab-bar {
    display: flex; background: var(--ink);
    border-bottom: 2px solid var(--accent);
  }
  .tab {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    padding: 14px 28px; color: #888; cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px; transition: color 0.2s;
  }
  .tab.active { color: var(--paper); border-bottom-color: var(--accent); }
  .tab:hover { color: #ccc; }

  .panel-content { flex:1; overflow: auto; position: relative; }
  .view { display:none; height:100%; }
  .view.active { display:block; }

  /* Definition view */
  .def-view { padding: 48px 56px; max-width: 760px; }
  .def-word {
    font-family: 'DM Serif Display', serif;
    font-size: 52px; line-height: 1;
    color: var(--ink); margin-bottom: 4px;
    border-bottom: 3px double var(--border);
    padding-bottom: 20px; margin-bottom: 24px;
  }
  .def-phonetic {
    font-family: 'DM Mono', monospace;
    font-size: 14px; color: var(--muted); margin-bottom: 8px;
  }
  .def-pos {
    display: inline-block;
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 2px; color: var(--paper);
    background: var(--accent2); padding: 3px 10px;
    border-radius: 2px; margin-bottom: 20px;
  }
  .def-meanings { list-style: none; }
  .def-meanings li {
    padding: 14px 0; border-bottom: 1px solid var(--cream);
    display: flex; gap: 16px; align-items: flex-start;
  }
  .def-num {
    font-family: 'DM Serif Display', serif; font-size: 20px;
    color: var(--accent); min-width: 24px;
  }
  .def-text { font-size: 15px; line-height: 1.7; color: var(--ink); }
  .def-example {
    margin-top: 6px; font-style: italic;
    color: var(--muted); font-size: 13px;
  }
  .def-empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; padding: 60px;
    text-align: center; color: var(--muted);
  }
  .def-empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.3; }
  .def-empty-text { font-family: 'DM Serif Display', serif; font-size: 24px; }

  /* Log view */
  .log-view { padding: 24px 32px; }
  .log-entry {
    display: flex; gap: 16px; align-items: flex-start;
    padding: 12px 0; border-bottom: 1px solid var(--cream);
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(-8px); } to { opacity:1; transform:none; } }
  .log-time {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--muted); min-width: 72px; padding-top: 2px;
  }
  .log-badge {
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 1px; padding: 2px 8px; border-radius: 2px;
    text-transform: uppercase; min-width: 64px; text-align: center;
  }
  .badge-add { background: rgba(39,115,74,0.15); color: #27734a; }
  .badge-del { background: rgba(192,57,43,0.15); color: var(--accent); }
  .badge-search { background: rgba(44,62,107,0.12); color: var(--accent2); }
  .log-msg { font-size: 14px; }

  /* Trie view */
  .trie-view { padding: 24px; overflow: auto; }
  .trie-title {
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 16px;
  }
  #trie-svg { border: 1px solid var(--border); border-radius: 4px; background: white; }

  /* Highlight */
  .highlight { animation: pulse 0.6s ease; }
  @keyframes pulse {
    0% { background: rgba(192,57,43,0.2); }
    100% { background: transparent; }
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 32px; right: 32px;
    font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 12px 20px; border-radius: 4px;
    background: var(--ink); color: var(--paper);
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    z-index: 999; letter-spacing: 1px;
    transform: translateY(80px); transition: transform 0.3s ease;
  }
  .toast.show { transform: none; }
  .toast.success { border-left: 3px solid #27734a; }
  .toast.error { border-left: 3px solid var(--accent); }
  .toast.info { border-left: 3px solid var(--accent2); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-title">Lexicon</span>
    <span class="logo-sub">Radix Trie Dictionary</span>
  </div>
  <div class="header-stats">
    <div class="stat"><span class="stat-val" id="stat-words">0</span><span class="stat-lbl">WORDS</span></div>
    <div class="stat"><span class="stat-val" id="stat-nodes">1</span><span class="stat-lbl">NODES</span></div>
    <div class="stat"><span class="stat-val" id="stat-ops">0</span><span class="stat-lbl">OPS</span></div>
  </div>
</header>

<div class="app">
  <!-- Left Panel -->
  <div class="left-panel">
    <!-- Add word -->
    <div class="panel-section">
      <div class="section-title">Thêm từ mới</div>
      <div class="input-row">
        <input type="text" id="inp-word" placeholder="Từ tiếng Anh (vd: ephemeral)" />
        <input type="text" id="inp-phonetic" placeholder="Phiên âm (vd: /ɪˈfem.ər.əl/)" />
        <input type="text" id="inp-pos" placeholder="Loại từ (noun / verb / adj...)" />
        <textarea id="inp-def" placeholder="Định nghĩa / nghĩa của từ..."></textarea>
        <input type="text" id="inp-example" placeholder="Ví dụ câu (tùy chọn)" />
        <div class="btn-row">
          <button class="btn-add" onclick="addWord()">＋ Thêm</button>
          <button class="btn-clear" onclick="clearInputs()">Xóa</button>
        </div>
      </div>
    </div>

    <!-- Delete & Search -->
    <div class="panel-section">
      <div class="section-title">Tra cứu / Xóa</div>
      <div class="input-row">
        <input type="text" id="inp-search" placeholder="Nhập từ cần tìm hoặc xóa..." />
        <div class="btn-row">
          <button class="btn-search" onclick="searchWord()">🔍 Tìm</button>
          <button class="btn-del" onclick="deleteWord()">✕ Xóa</button>
        </div>
      </div>
    </div>

    <!-- Word List -->
    <div class="wordlist-wrap">
      <div class="wordlist-header">Danh sách từ (<span id="word-count">0</span>)</div>
      <div id="word-list"></div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('def')">📖 Định nghĩa</div>
      <div class="tab" onclick="switchTab('trie')">🌳 Radix Trie</div>
      <div class="tab" onclick="switchTab('log')">📋 Nhật ký</div>
    </div>
    <div class="panel-content">
      <!-- Definition -->
      <div class="view active" id="view-def">
        <div id="def-area" class="def-empty">
          <div class="def-empty-icon">📚</div>
          <div class="def-empty-text">Chọn từ để xem định nghĩa</div>
          <div style="margin-top:8px;font-size:13px;">hoặc nhập từ và nhấn Tìm</div>
        </div>
      </div>

      <!-- Trie -->
      <div class="view" id="view-trie">
        <div class="trie-view">
          <div class="trie-title">Cấu trúc Radix Trie — Mỗi cạnh là chuỗi ký tự, node lá = từ hoàn chỉnh</div>
          <svg id="trie-svg" width="900" height="500"></svg>
        </div>
      </div>

      <!-- Log -->
      <div class="view" id="view-log">
        <div class="log-view" id="log-area">
          <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;">Nhật ký thao tác</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════
   RADIX TRIE IMPLEMENTATION
═══════════════════════════════════════════════ */
class RadixTrieNode {
  constructor() {
    this.children = {};   // key: edge label (string), value: RadixTrieNode
    this.isEnd = false;
    this.wordKey = null;  // the full word if isEnd
  }
}

class RadixTrie {
  constructor() {
    this.root = new RadixTrieNode();
    this.nodeCount = 1;
  }

  // Find common prefix length
  _commonPrefix(a, b) {
    let i = 0;
    while (i < a.length && i < b.length && a[i] === b[i]) i++;
    return i;
  }

  insert(word) {
    const key = word.toLowerCase();
    let node = this.root;
    let remaining = key;

    while (remaining.length > 0) {
      let matched = false;
      for (let edge in node.children) {
        const cp = this._commonPrefix(remaining, edge);
        if (cp === 0) continue;

        if (cp === edge.length) {
          // Full edge match — descend
          node = node.children[edge];
          remaining = remaining.slice(cp);
          matched = true;
          break;
        } else {
          // Partial match — split node
          const sharedEdge = edge.slice(0, cp);
          const oldSuffix = edge.slice(cp);
          const newSuffix = remaining.slice(cp);

          const oldChild = node.children[edge];
          delete node.children[edge];

          const splitNode = new RadixTrieNode();
          this.nodeCount++;
          node.children[sharedEdge] = splitNode;
          splitNode.children[oldSuffix] = oldChild;

          if (newSuffix.length === 0) {
            splitNode.isEnd = true;
            splitNode.wordKey = key;
          } else {
            const newLeaf = new RadixTrieNode();
            this.nodeCount++;
            newLeaf.isEnd = true;
            newLeaf.wordKey = key;
            splitNode.children[newSuffix] = newLeaf;
          }
          return true;
        }
      }
      if (!matched) {
        const leaf = new RadixTrieNode();
        this.nodeCount++;
        leaf.isEnd = true;
        leaf.wordKey = key;
        node.children[remaining] = leaf;
        remaining = '';
      }
    }
    if (!node.isEnd) {
      node.isEnd = true;
      node.wordKey = key;
      return true;
    }
    return false; // already exists
  }

  search(word) {
    const key = word.toLowerCase();
    let node = this.root;
    let remaining = key;
    while (remaining.length > 0) {
      let matched = false;
      for (let edge in node.children) {
        if (remaining.startsWith(edge)) {
          node = node.children[edge];
          remaining = remaining.slice(edge.length);
          matched = true;
          break;
        }
      }
      if (!matched) return null;
    }
    return node.isEnd ? node : null;
  }

  delete(word) {
    const key = word.toLowerCase();
    const path = []; // [{node, edge, parent}]
    let node = this.root;
    let remaining = key;

    while (remaining.length > 0) {
      let matched = false;
      for (let edge in node.children) {
        if (remaining.startsWith(edge)) {
          path.push({ parent: node, edge, child: node.children[edge] });
          node = node.children[edge];
          remaining = remaining.slice(edge.length);
          matched = true;
          break;
        }
      }
      if (!matched) return false;
    }
    if (!node.isEnd) return false;

    node.isEnd = false;
    node.wordKey = null;

    // Collapse nodes
    if (Object.keys(node.children).length === 0 && path.length > 0) {
      const { parent, edge } = path[path.length - 1];
      delete parent.children[edge];
      this.nodeCount--;

      // If parent now has 1 child and is not end, merge
      if (path.length >= 2) {
        const grandparent = path[path.length - 2];
        const parentNode = grandparent.child;
        const parentEdge = grandparent.edge;
        const parentKeys = Object.keys(parentNode.children);
        if (parentKeys.length === 1 && !parentNode.isEnd) {
          const onlyEdge = parentKeys[0];
          const onlyChild = parentNode.children[onlyEdge];
          delete grandparent.parent.children[parentEdge];
          grandparent.parent.children[parentEdge + onlyEdge] = onlyChild;
          this.nodeCount--;
        }
      }
    }
    return true;
  }

  // Collect all words with prefix
  autocomplete(prefix) {
    const key = prefix.toLowerCase();
    let node = this.root;
    let remaining = key;
    while (remaining.length > 0) {
      let matched = false;
      for (let edge in node.children) {
        if (remaining.startsWith(edge)) {
          node = node.children[edge];
          remaining = remaining.slice(edge.length);
          matched = true;
          break;
        }
        if (edge.startsWith(remaining)) {
          node = node.children[edge];
          remaining = '';
          matched = true;
          break;
        }
      }
      if (!matched) return [];
    }
    const results = [];
    this._collect(node, results);
    return results;
  }

  _collect(node, results) {
    if (node.isEnd) results.push(node.wordKey);
    for (let edge in node.children) this._collect(node.children[edge], results);
  }

  // Get tree structure for visualization
  getTree() {
    return { label: 'ROOT', node: this.root };
  }
}

/* ═══════════════════════════════════════════════
   APP STATE
═══════════════════════════════════════════════ */
const trie = new RadixTrie();
const dictionary = {};  // word → {phonetic, pos, definition, example}
let opCount = 0;
let currentWord = null;

// Pre-load sample words
const sampleWords = [
  { word: 'ephemeral', phonetic: '/ɪˈfem.ər.əl/', pos: 'adjective',
    definition: 'Lasting for a very short time; transitory.',
    example: 'The ephemeral beauty of cherry blossoms draws millions of visitors.' },
  { word: 'eloquent', phonetic: '/ˈel.ə.kwənt/', pos: 'adjective',
    definition: 'Fluent or persuasive in speaking or writing.',
    example: 'She gave an eloquent speech that moved the entire audience.' },
  { word: 'serendipity', phonetic: '/ˌser.ənˈdɪp.ɪ.ti/', pos: 'noun',
    definition: 'The occurrence and development of events by chance in a happy or beneficial way.',
    example: 'It was pure serendipity that led him to discover penicillin.' },
  { word: 'sonder', phonetic: '/ˈsɒn.dər/', pos: 'noun',
    definition: 'The realization that each passerby has a life as vivid and complex as one\'s own.',
    example: 'Walking through the busy market, she felt a deep sense of sonder.' },
  { word: 'solitude', phonetic: '/ˈsɒl.ɪ.tjuːd/', pos: 'noun',
    definition: 'The state or situation of being alone, often in a peaceful way.',
    example: 'He treasured the solitude of early morning runs.' },
  { word: 'epitome', phonetic: '/ɪˈpɪt.ə.mi/', pos: 'noun',
    definition: 'A person or thing that is a perfect example of a particular quality or type.',
    example: 'She is the epitome of grace under pressure.' },
];
sampleWords.forEach(w => {
  trie.insert(w.word);
  dictionary[w.word.toLowerCase()] = w;
});

/* ═══════════════════════════════════════════════
   UI FUNCTIONS
═══════════════════════════════════════════════ */
function updateStats() {
  document.getElementById('stat-words').textContent = Object.keys(dictionary).length;
  document.getElementById('stat-nodes').textContent = trie.nodeCount;
  document.getElementById('stat-ops').textContent = opCount;
  document.getElementById('word-count').textContent = Object.keys(dictionary).length;
}

function renderWordList() {
  const list = document.getElementById('word-list');
  const words = Object.keys(dictionary).sort();
  list.innerHTML = words.map(w => {
    const entry = dictionary[w];
    return `<div class="word-item ${w === currentWord ? 'active' : ''}" 
              id="wi-${w}" onclick="showDefinition('${w}')">
      <div>
        <div class="word-text">${w}</div>
        <div class="word-type">${entry.pos || ''}</div>
      </div>
      <button class="word-del-btn" onclick="event.stopPropagation();quickDelete('${w}')">✕</button>
    </div>`;
  }).join('');
  updateStats();
}

function showDefinition(word) {
  const entry = dictionary[word.toLowerCase()];
  currentWord = word.toLowerCase();
  renderWordList();
  if (!entry) return;

  const defs = entry.definition.split('|').map(d => d.trim());
  document.getElementById('def-area').innerHTML = `
    <div class="def-view">
      <div class="def-word">${word}</div>
      ${entry.phonetic ? `<div class="def-phonetic">${entry.phonetic}</div>` : ''}
      ${entry.pos ? `<div class="def-pos">${entry.pos}</div>` : ''}
      <ul class="def-meanings">
        ${defs.map((d, i) => `
          <li>
            <span class="def-num">${i+1}.</span>
            <div>
              <div class="def-text">${d}</div>
              ${entry.example && i === 0 ? `<div class="def-example">"${entry.example}"</div>` : ''}
            </div>
          </li>`).join('')}
      </ul>
    </div>`;

  // Scroll to word in list
  const el = document.getElementById(`wi-${word.toLowerCase()}`);
  if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
  el?.classList.add('highlight');
  setTimeout(() => el?.classList.remove('highlight'), 800);
}

function addWord() {
  const word = document.getElementById('inp-word').value.trim().toLowerCase();
  const phonetic = document.getElementById('inp-phonetic').value.trim();
  const pos = document.getElementById('inp-pos').value.trim();
  const def = document.getElementById('inp-def').value.trim();
  const example = document.getElementById('inp-example').value.trim();

  if (!word) { showToast('Vui lòng nhập từ', 'error'); return; }
  if (!def) { showToast('Vui lòng nhập định nghĩa', 'error'); return; }
  if (dictionary[word]) { showToast(`"${word}" đã tồn tại trong từ điển`, 'error'); return; }

  trie.insert(word);
  dictionary[word] = { word, phonetic, pos, definition: def, example };
  opCount++;
  addLog('add', `Đã thêm từ "${word}" vào từ điển`);
  renderWordList();
  renderTrie();
  showDefinition(word);
  clearInputs();
  showToast(`Đã thêm "${word}" thành công`, 'success');
  switchTab('def');
}

function deleteWord() {
  const word = document.getElementById('inp-search').value.trim().toLowerCase();
  if (!word) { showToast('Nhập từ cần xóa', 'error'); return; }
  quickDelete(word);
}

function quickDelete(word) {
  word = word.toLowerCase();
  if (!dictionary[word]) { showToast(`"${word}" không tồn tại`, 'error'); return; }
  const ok = trie.delete(word);
  if (ok) {
    delete dictionary[word];
    opCount++;
    addLog('del', `Đã xóa từ "${word}" khỏi từ điển`);
    if (currentWord === word) {
      currentWord = null;
      document.getElementById('def-area').innerHTML = `
        <div class="def-empty">
          <div class="def-empty-icon">🗑️</div>
          <div class="def-empty-text">Từ "${word}" đã được xóa</div>
        </div>`;
    }
    renderWordList();
    renderTrie();
    showToast(`Đã xóa "${word}"`, 'success');
  }
}

function searchWord() {
  const word = document.getElementById('inp-search').value.trim().toLowerCase();
  if (!word) { showToast('Nhập từ cần tìm', 'error'); return; }
  opCount++;
  addLog('search', `Tìm kiếm "${word}" trên Radix Trie`);

  const node = trie.search(word);
  if (node && dictionary[word]) {
    showToast(`Tìm thấy "${word}"`, 'info');
    showDefinition(word);
    switchTab('def');
  } else {
    // Try autocomplete
    const suggestions = trie.autocomplete(word).filter(w => dictionary[w]);
    if (suggestions.length > 0) {
      showToast(`Gợi ý: ${suggestions.slice(0,3).join(', ')}`, 'info');
    } else {
      showToast(`Không tìm thấy "${word}"`, 'error');
    }
    document.getElementById('def-area').innerHTML = `
      <div class="def-empty">
        <div class="def-empty-icon">🔍</div>
        <div class="def-empty-text">Không tìm thấy "${word}"</div>
        ${suggestions.length ? `<div style="margin-top:12px;font-size:13px;">Có thể bạn muốn tìm: <strong>${suggestions.slice(0,5).join(', ')}</strong></div>` : ''}
      </div>`;
  }
  updateStats();
}

function clearInputs() {
  ['inp-word','inp-phonetic','inp-pos','inp-def','inp-example'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['def','trie','log'][i] === tab);
  });
  document.querySelectorAll('.view').forEach((v,i) => {
    v.classList.toggle('active', ['view-def','view-trie','view-log'][i] === `view-${tab}`);
  });
  if (tab === 'trie') renderTrie();
}

/* ═══════════════════════════════════════════════
   TRIE VISUALIZATION
═══════════════════════════════════════════════ */
function renderTrie() {
  const svg = document.getElementById('trie-svg');
  const W = 900, H = 500;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  // Build layout tree
  const layout = [];
  function buildLayout(node, x, y, spanW, depth) {
    const childEdges = Object.keys(node.children);
    if (childEdges.length === 0) {
      layout.push({ node, x, y, isLeaf: true });
      return { minX: x, maxX: x };
    }
    const childWidth = spanW / childEdges.length;
    let childXs = [];
    childEdges.forEach((edge, i) => {
      const cx = x - spanW/2 + childWidth*(i+0.5);
      const cy = y + 80;
      const child = node.children[edge];
      buildLayout(child, cx, cy, childWidth * 0.9, depth+1);
      layout.push({ node: child, x: cx, y: cy, isLeaf: Object.keys(child.children).length === 0, edge, parentX: x, parentY: y });
      childXs.push(cx);
    });
    return {};
  }

  layout.length = 0;
  layout.push({ node: trie.root, x: W/2, y: 50, isLeaf: false, isRoot: true });
  buildLayout(trie.root, W/2, 50, W-80, 0);

  let svgHtml = `
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="#c0392b" opacity="0.5"/>
      </marker>
    </defs>`;

  // Draw edges first
  layout.forEach(item => {
    if (item.parentX !== undefined) {
      const midX = (item.parentX + item.x) / 2;
      const midY = (item.parentY + item.y) / 2;
      svgHtml += `<line x1="${item.parentX}" y1="${item.parentY+16}" x2="${item.x}" y2="${item.y-16}" 
        stroke="#c0392b" stroke-width="1.5" stroke-opacity="0.4" marker-end="url(#arrow)"/>`;
      // Edge label
      svgHtml += `<text x="${midX}" y="${midY}" text-anchor="middle" 
        font-family="DM Mono,monospace" font-size="11" fill="#c0392b" font-weight="500"
        style="background:white">${escHtml(item.edge || '')}</text>`;
    }
  });

  // Draw nodes
  layout.forEach(item => {
    if (item.isRoot) {
      svgHtml += `<circle cx="${item.x}" cy="${item.y}" r="18" fill="#1a1a2e"/>
        <text x="${item.x}" y="${item.y+5}" text-anchor="middle" font-family="DM Mono,monospace" 
          font-size="10" fill="white">ROOT</text>`;
    } else if (item.isLeaf && item.node.isEnd) {
      svgHtml += `<rect x="${item.x-22}" y="${item.y-14}" width="44" height="28" rx="4"
        fill="#27734a" opacity="0.9"/>
        <text x="${item.x}" y="${item.y+5}" text-anchor="middle" font-family="DM Mono,monospace"
          font-size="9" fill="white" font-weight="500">${escHtml((item.node.wordKey||'').slice(0,8))}</text>`;
    } else if (item.node.isEnd) {
      svgHtml += `<circle cx="${item.x}" cy="${item.y}" r="14" fill="#2c3e6b"/>
        <circle cx="${item.x}" cy="${item.y}" r="10" fill="#27734a" opacity="0.7"/>`;
    } else {
      svgHtml += `<circle cx="${item.x}" cy="${item.y}" r="14" fill="#2c3e6b" opacity="0.85"/>`;
    }
  });

  // Legend
  svgHtml += `
    <rect x="16" y="${H-60}" width="240" height="48" rx="4" fill="rgba(0,0,0,0.04)" stroke="#c8bfaa" stroke-width="1"/>
    <circle cx="36" cy="${H-44}" r="7" fill="#1a1a2e"/>
    <text x="50" y="${H-40}" font-family="DM Mono,monospace" font-size="10" fill="#7a7060">Node trung gian</text>
    <rect x="26" y="${H-28}" width="20" height="12" rx="2" fill="#27734a"/>
    <text x="50" y="${H-18}" font-family="DM Mono,monospace" font-size="10" fill="#7a7060">Node lá (từ hoàn chỉnh)</text>`;

  svg.innerHTML = svgHtml;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ═══════════════════════════════════════════════
   LOG
═══════════════════════════════════════════════ */
function addLog(type, msg) {
  const area = document.getElementById('log-area');
  const time = new Date().toLocaleTimeString('vi-VN', { hour12: false });
  const badges = { add: 'badge-add', del: 'badge-del', search: 'badge-search' };
  const labels = { add: 'THÊM', del: 'XÓA', search: 'TÌM' };
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="log-time">${time}</span>
    <span class="log-badge ${badges[type]}">${labels[type]}</span>
    <span class="log-msg">${msg}</span>`;
  area.appendChild(entry);
  area.scrollTop = area.scrollHeight;
}

function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 2800);
}

/* ─── Enter key shortcuts ─── */
document.getElementById('inp-word').addEventListener('keydown', e => { if (e.key === 'Enter') addWord(); });
document.getElementById('inp-search').addEventListener('keydown', e => { if (e.key === 'Enter') searchWord(); });

/* ─── Init ─── */
renderWordList();
renderTrie();
addLog('add', 'Khởi tạo từ điển với 6 từ mẫu');
</script>
