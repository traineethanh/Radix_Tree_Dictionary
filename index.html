<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Dictionary</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/style.css">
    </head>

    <body>
        <div class="container">
            <div class="search-selection">
                <div class="header">
                    <h1>Dictionary</h1>
                    <p class="subtitle">Search for any word to see its definition, pronunciation, and examples</p>
                </div>
    
                <form class="search-form" id="searchForm">
                    <input
                        type="text"
                        id="searchInput"
                        class="search-input"
                        placeholder="Search for a word..."
                        autocomplete="off"
                    >
                    <button type="submit" class="search-button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </button>
                </form>

                <div id="loading" class="loading hidden">
                    <div class="spinner"></div>
                </div>
    
                <div id="error" class="error hidden"></div>
    
                <div id="results" class="hidden"></div>
            </div>
            
            <div class="visualizer-section">
                <h3>Radix Trie Structure</h3>
                <div id="trie-visualizer" class="trie-container">
                    <!-- Các node của cây sẽ được render vào đây bằng JS -->
                    <div class="trie-node root">root</div>
                </div>
                
                <div id="results" class="hidden"></div>
            </div>
        </div>

        <script src="js/script.js"></script>
    </body>
</html>
